<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Page Not Found | Expressions by Tosha Hanvey</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{background:#fdf8f5;font-family:'Jost',sans-serif;display:flex;align-items:center;justify-content:center;padding:2rem;min-height:100vh;overflow:hidden;}
.blob-bg{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden;}
.blob{position:absolute;border-radius:60% 40% 55% 45%/45% 55% 40% 60%;opacity:.18;filter:blur(60px);animation:blobFloat 18s ease-in-out infinite;}
.blob-1{width:500px;height:500px;background:#c9a7d4;top:-100px;left:-100px;}
.blob-2{width:400px;height:400px;background:#e8b4c0;top:40%;right:-80px;animation-delay:6s;}
.blob-3{width:350px;height:350px;background:#a8c5b0;bottom:-80px;left:30%;animation-delay:12s;}
@keyframes blobFloat{0%,100%{transform:translate(0,0) scale(1);}33%{transform:translate(20px,-30px) scale(1.05);}66%{transform:translate(-15px,20px) scale(.97);}}
.card{position:relative;z-index:1;background:#fffbfe;border-radius:24px;padding:3.5rem 3rem;text-align:center;max-width:480px;width:100%;box-shadow:0 8px 50px rgba(140,100,160,.1);border:1px solid #e8dff0;animation:fadeUp .8s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
.icon{font-size:4rem;margin-bottom:1.2rem;animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
.num{font-family:'Playfair Display',serif;font-size:5rem;font-weight:600;color:#c9a7d4;line-height:1;margin-bottom:.5rem;}
h1{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:600;color:#3d2f45;margin-bottom:.8rem;line-height:1.3;}
h1 em{font-style:italic;color:#c9a7d4;}
p{color:#6e5878;font-size:.95rem;line-height:1.7;margin-bottom:2rem;max-width:340px;margin-left:auto;margin-right:auto;}
.btn{display:inline-flex;align-items:center;gap:.5rem;padding:13px 28px;border-radius:50px;background:#c9a7d4;color:#fff;font-family:'Jost',sans-serif;font-size:.85rem;font-weight:500;letter-spacing:.06em;text-transform:uppercase;text-decoration:none;border:none;cursor:pointer;transition:transform .2s,box-shadow .2s;margin:.3rem;}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(140,100,160,.25);}
.btn-outline{background:transparent;color:#c9a7d4;border:1.5px solid #c9a7d4;}
.btn-outline:hover{background:#c9a7d4;color:#fff;}
.footer-note{margin-top:2rem;font-size:.75rem;color:#9e8faa;font-family:'Jost',sans-serif;}
</style>
</head>
<body>
<div class="blob-bg">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>
<div class="card">
  <div class="icon">🎨</div>
  <div class="num">404</div>
  <h1>This page <em>wandered off</em></h1>
  <p>It happens to all of us — sometimes we end up somewhere unexpected. Let's get you back to something beautiful.</p>
  <div>
    <a href="/ExpressionsByTosha/" class="btn">← Back to the Art</a>
    <a href="/ExpressionsByTosha/#shop" class="btn btn-outline">Browse the Shop</a>
  </div>
  <p class="footer-note">Expressions by Tosha Hanvey &nbsp;·&nbsp; Art With Purpose</p>
</div>
</body>
</html>
